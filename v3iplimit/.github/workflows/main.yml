name: Build and Upload V2IpLimit

on:
  push:
    paths:
      - "v2iplimit.py"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install your Dependencies
        run: |
          pip install -r requirements.txt
      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: v2iplimit.py
          mode: app
          include-package: "websockets,logging"
          python-flag: "-OO"
          assume-yes-for-downloads: true
          output-dir: build
          caching-key: nuitka-${{ runner.os }}-${{ runner.arch }}-py-${{ matrix.python-version }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}_${{ runner.arch }}_build
          path: |
            build/*.bin
            build/*.exe
